import:
  targetTable: "sample.work_list"
  operation: "UPSERT"
  batchSize: 100
  naturalKeys:
    - "name"
  columnMappings:
    - csv: "NAME"
      column: "name"
      type: "VARCHAR"
    - csv: "ISPICK"
      column: "list_type"
      type: "VARCHAR"
      transformScript: "config/scripts/work_list_transform.js"
      transformFunction: "transformListType"
    - csv: "BATCH_STATUS"
      column: "list_status"
      type: "VARCHAR"
      transformScript: "config/scripts/work_list_transform.js"
      transformFunction: "transformListStatus"
    - csv: "USERNAME"
      column: "assigned_to"
      type: "VARCHAR"
    - csv: "COMMENT"
      column: "comment"
      type: "VARCHAR"
    - csv: "USERNAME"
      column: "userstamp"
      type: "VARCHAR"
    - csv: "BEGIN_TIME"
      column: "created"
      type: "TIMESTAMP"
      transformScript: "config/scripts/work_list_transform.js"
      transformFunction: "transformCreated"
    - csv: "PROJECT_ABBREVIATION"
      column: "project_id"
      type: "BIGINT"
      foreignKey:
        parentTable: "project.project"
        parentNaturalKey:
          - csv: "PROJECT_ABBREVIATION"
            column: "name"
    - csv: "PARTNER_NAME"
      column: "partner_id"
      type: "BIGINT"
      transformScript: "config/scripts/work_list_transform.js"
      transformFunction: "transformPartnerName"
      foreignKey:
        parentTable: "project.partner"
        parentNaturalKey:
          - csv: "PARTNER_NAME"
            column: "name"
